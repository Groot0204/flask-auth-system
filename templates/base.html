<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container" id="container">
        <!-- SIGN UP -->
        <div class="form-container sign-up">
            <form method="POST" action="{{ url_for('register') }}">
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>

                <span>or use your email</span>

                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>

                <!-- MOBILE TOGGLE -->
                <p class="mobile-toggle">
                    Already have an account?
                    <a href="#" id="mobile-login">Sign In</a>
                </p>
            </form>
        </div>

        <!-- SIGN IN -->
        <div class="form-container sign-in">
            <form method="POST" action="{{ url_for('login') }}">
                <h1>Sign In</h1>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>

                <span>or use your email password</span>
                
                <input type="text" name="identifier" placeholder="Username or Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <a href="{{ url_for('forgot_password') }}">
                    Forgot Your Password?
                </a>
                <button type="submit">Sign In</button>
                <!-- MOBILE TOGGLE -->
                <p class="mobile-toggle">
                    Don't have an account?
                    <a href="#" id="mobile-register">Sign Up</a>
                </p>
            </form>
        </div>

        <!-- TOGGLE PANEL (DESKTOP ONLY) -->
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <p>Enter your personal details</p>
                    <button class="hidden" id="login">
                        Sign In
                    </button>
                </div>

                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <p>Register to use all features</p>
                    <button class="hidden" id="register">
                        Sign Up
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
